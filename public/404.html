<!-- 404 Content -->
    <section class="error-page">
        <div class="container">
            <div class="error-content">
                <div class="error-visual">
                    <div class="error-number">404</div>
                    <div class="error-icon">🔍</div>
                </div>
                <h1>Oops! Trang không tìm thấy</h1>
                <p>Trang bạn đang tìm kiếm có thể đã bị di chuyển, xóa hoặc không tồn tại.</p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">Về trang chủ</a>
                    <a href="/contact" class="btn btn-secondary">Liên hệ hỗ trợ</a>
                </div>
                <div class="suggested-links">
                    <h3>Có thể bạn quan tâm:</h3>
                    <ul>
                        <li><a href="/news">Đọc tin tức mới nhất</a></li>
                        <li><a href="/products">Khám phá sản phẩm</a></li>
                        <li><a href="/about">Tìm hiểu về chúng tôi</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    
<script src="js/main.js"></script>
    <style>
        .error-page {
            padding: 6rem 0;
            background: linear-gradient(135deg, var(--bg-accent) 0%, var(--bg-secondary) 100%);
            min-height: 70vh;
            display: flex;
            align-items: center;
        }

        .error-content {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .error-visual {
            position: relative;
            margin-bottom: 2rem;
        }

        .error-number {
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary-color);
            opacity: 0.1;
            line-height: 1;
        }

        .error-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--text-primary);
        }

        .error-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .error-content p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .suggested-links {
            background-color: var(--bg-primary);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .suggested-links h3 {
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .suggested-links ul {
            list-style: none;
            padding: 0;
        }

        .suggested-links li {
            margin-bottom: 0.5rem;
        }

        .suggested-links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .suggested-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .error-number {
                font-size: 6rem;
            }

            .error-icon {
                font-size: 3rem;
            }

            .error-content h1 {
                font-size: 2rem;
            }

            .error-actions {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>

    <!-- Floating Social Media Buttons -->
    <div class="floating-social">
        <a href="https://www.facebook.com/profile.php?id=61572981361471" target="_blank" rel="noopener" class="social-float-btn facebook" aria-label="Facebook">
