</head>
<body>
<!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="register-container">
                <div class="register-card">
                    <div class="register-header">
                        <h1>Đăng ký tài khoản Smart Steam</h1>
                        <h2>Tạo tài khoản để khám phá thế giới STEAM</h2>
                        <p>Tham gia cộng đồng giáo dục STEAM hàng đầu Việt Nam</p>
                    </div>
                    
                    <form class="register-form" id="registerForm" method="post" action="javascript:void(0)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">Họ</label>
                                <input type="text" id="firstName" name="firstName" placeholder="Nhập họ" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Tên</label>
                                <input type="text" id="lastName" name="lastName" placeholder="Nhập tên" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Số điện thoại</label>
                            <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Mật khẩu</label>
                            <div class="password-input">
                                <input type="password" id="password" name="password" placeholder="Tạo mật khẩu mạnh" required>
                                <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                            </div>
                            <div class="password-strength" id="passwordStrength">
                                <div class="strength-bar">
                                    <div class="strength-fill"></div>
                                </div>
                                <span class="strength-text">Nhập mật khẩu</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmPassword">Xác nhận mật khẩu</label>
                            <div class="password-input">
                                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                                <button type="button" class="toggle-password" id="toggleConfirmPassword">👁️</button>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="terms" required>
                                <span>Tôi đồng ý với <a href="/terms">Điều khoản sử dụng</a> và <a href="/privacy">Chính sách bảo mật</a></span>
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="newsletter">
                                <span>Đăng ký nhận tin tức và ưu đãi từ Smart Steam</span>
                            </label>
                        </div>
                        
                        <button type="submit" class="register-btn">Tạo tài khoản</button>
                    </form>
                    
                    <div class="divider">
                        <span>Hoặc</span>
                    </div>
                    
                    <button class="google-login-btn" onclick="registerWithGoogle()">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Đăng ký với Google
                    </button>
                    
                    <div class="register-footer">
                        <p>Đã có tài khoản? <a href="/login">Đăng nhập ngay</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    
<script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <style>
    /* Mobile auth section display */
    @media (max-width: 768px) {
        .mobile-auth-section { display: block !important; }
    }
    @media (min-width: 769px) {
        html body .mobile-auth-section {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
        }
    }
    </style>
    <script>
    function registerWithGoogle() {
        try {
            window.location.href = '/api/auth/google/redirect';
        } catch (error) {
            console.error('Google register error:', error);
            alert('Có lỗi xảy ra khi đăng ký với Google');
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    togglePassword.textContent = '🙈';
                } else {
                    passwordInput.type = 'password';
                    togglePassword.textContent = '👁️';
                }
            });
        }
        
        if (toggleConfirmPassword && confirmPasswordInput) {
            toggleConfirmPassword.addEventListener('click', function() {
                if (confirmPasswordInput.type === 'password') {
                    confirmPasswordInput.type = 'text';
                    toggleConfirmPassword.textContent = '🙈';
                } else {
                    confirmPasswordInput.type = 'password';
                    toggleConfirmPassword.textContent = '👁️';
                }
            });
        }
        
        // Password strength indicator
        const strengthBar = document.querySelector('.strength-fill');
        const strengthText = document.querySelector('.strength-text');
        
        if (passwordInput && strengthBar && strengthText) {
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                const strength = getPasswordStrength(password);
                
                strengthBar.style.width = strength.percentage + '%';
                strengthBar.className = 'strength-fill ' + strength.class;
                strengthText.textContent = strength.text;
            });
        }
        
        // Mobile menu toggle
        const toggle = document.querySelector('.nav-toggle');
        const menu = document.querySelector('.nav-menu');
        if (toggle && menu) {
            toggle.addEventListener('click', function() {
                menu.classList.toggle('active');
            });
            menu.addEventListener('click', function(e) {
                if (e.target.classList.contains('nav-link')) {
                    menu.classList.remove('active');
                }
            });
        }
    });
    
    function getPasswordStrength(password) {
        let score = 0;
        let feedback = [];
        
        if (password.length >= 8) score++;
        else feedback.push('ít nhất 8 ký tự');
        
        if (/[a-z]/.test(password)) score++;
        else feedback.push('chữ thường');
        
        if (/[A-Z]/.test(password)) score++;
        else feedback.push('chữ hoa');
        
        if (/[0-9]/.test(password)) score++;
        else feedback.push('số');
        
        if (/[^A-Za-z0-9]/.test(password)) score++;
        else feedback.push('ký tự đặc biệt');
        
        const strengthLevels = [
            { percentage: 20, class: 'weak', text: 'Yếu' },
            { percentage: 40, class: 'weak', text: 'Yếu' },
            { percentage: 60, class: 'medium', text: 'Trung bình' },
            { percentage: 80, class: 'strong', text: 'Mạnh' },
            { percentage: 100, class: 'very-strong', text: 'Rất mạnh' }
        ];
        
        return strengthLevels[Math.min(score, 4)] || { percentage: 0, class: 'weak', text: 'Nhập mật khẩu' };
    }
    </script>

    <!-- Floating Social Media Buttons -->
    <div class="floating-social">
        <a href="https://www.facebook.com/profile.php?id=61572981361471" target="_blank" rel="noopener" class="social-float-btn facebook" aria-label="Facebook">
            <span class="icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M22 12.073C22 6.477 17.523 2 11.927 2 6.332 2 1.855 6.477 1.855 12.073c0 4.997 3.657 9.141 8.438 9.878v-6.987H7.898v-2.89h2.395V9.845c0-2.368 1.41-3.675 3.567-3.675 1.034 0 2.115.185 2.115.185v2.327h-1.19c-1.175 0-1.54.73-1.54 1.478v1.775h2.617l-.418 2.89h-2.199v6.987c4.78-.737 8.437-4.88 8.437-9.878z"/>
                </svg>
            </span>
            <span class="tooltip">Theo dõi Facebook</span>
        </a>
        <a href="https://zalo.me/g/qlzzhf503" target="_blank" rel="noopener" class="social-float-btn zalo" aria-label="Zalo">
            <span class="icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/2048px-Icon_of_Zalo.svg.png" alt="Zalo" width="24" height="24">
            </span>
            <span class="tooltip">Chat Zalo</span>
        </a>
    </div>
</body>
