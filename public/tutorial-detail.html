    <script>
        function getSlug() {
            const parts = window.location.pathname.split('/');
            return decodeURIComponent(parts[parts.length - 1]);
        }

        function getFirstImageFromHtml(html) {
            try {
                if (!html || typeof html !== 'string') return '';
                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;
                const img = wrapper.querySelector('img[src]');
                return img ? (img.getAttribute('src') || '').trim() : '';
            } catch (_) {
                return '';
            }
        }

        function normalizeImageUrl(url, fallback) {
            try {
                if (!url || typeof url !== 'string') return fallback || '';
                let value = url.trim();
                if (!value) return fallback || '';

                if (value.startsWith('//')) value = 'https:' + value;
                if (!/^https?:\/\//i.test(value) && !value.startsWith('/')) {
                    value = '/' + value.replace(/^\.?\//, '');
                }
                if (/^(uploads\/|public\/uploads\/)/i.test(value)) {
                    value = '/' + value.replace(/^\//, '');
                }
                return value;
            } catch (_) {
                return fallback || '';
            }
        }

                function toNumber(value) {
            if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
            if (typeof value !== 'string') return 0;

            const text = value.trim();
            if (!text) return 0;

            const cleaned = text.replace(/[^\d,.-]/g, '');
            if (!cleaned) return 0;

            let normalized = cleaned;
            const hasComma = normalized.indexOf(',') >= 0;
            const hasDot = normalized.indexOf('.') >= 0;

            if (hasComma && hasDot) {
                const lastComma = normalized.lastIndexOf(',');
                const lastDot = normalized.lastIndexOf('.');
                const decimalSep = lastComma > lastDot ? ',' : '.';
                const thousandSep = decimalSep === ',' ? '.' : ',';
                normalized = normalized.split(thousandSep).join('');
                if (decimalSep === ',') normalized = normalized.replace(',', '.');
            } else if (hasComma) {
                normalized = /^-?\d{1,3}(,\d{3})+$/.test(normalized)
                    ? normalized.replace(/,/g, '')
                    : normalized.replace(',', '.');
            } else if (hasDot) {
                normalized = /^-?\d{1,3}(\.\d{3})+$/.test(normalized)
                    ? normalized.replace(/\./g, '')
                    : normalized;
            }

            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function formatVnd(value) {
            const num = toNumber(value);
            return num > 0 ? num.toLocaleString('vi-VN') + String.fromCharCode(273) : '';
        }

        function getProductThumbnail(product) {
            const fallback = 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=120&h=80&fit=crop';
            const thumb =
                product?.thumbnail ||
                product?.image ||
                product?.coverImage ||
                product?.featuredImage ||
                (Array.isArray(product?.images) ? product.images[0] : '') ||
                getFirstImageFromHtml(product?.description || product?.content || product?.body || '');

            return normalizeImageUrl(thumb, fallback);
        }

                function getProductPricing(product) {
            const currentCandidates = [
                product?.price,
                product?.salePrice,
                product?.currentPrice,
                product?.finalPrice,
                product?.sale_price,
                product?.current_price,
                product?.final_price
            ];
            const current = currentCandidates.map(toNumber).find(v => v > 0) || 0;

            const originalCandidates = [
                product?.originalPrice,
                product?.oldPrice,
                product?.compareAtPrice,
                product?.listPrice,
                product?.priceBeforeDiscount,
                product?.regularPrice,
                product?.basePrice,
                product?.original_price,
                product?.old_price,
                product?.compare_price,
                product?.list_price,
                product?.regular_price,
                product?.base_price
            ];
            let original = originalCandidates.map(toNumber).find(v => v > 0) || 0;

            let discount = toNumber(
                product?.discountPercent ??
                product?.discount ??
                product?.discountRate ??
                product?.discount_percent ??
                product?.discount_percentage ??
                product?.saleOff
            );

            if (discount > 0 && discount < 1) {
                discount = Math.round(discount * 100);
            }

            if ((!discount || discount <= 0) && original > current && current > 0) {
                discount = Math.round(((original - current) / original) * 100);
            }

            if ((!original || original <= 0) && current > 0 && discount > 0 && discount < 100) {
                original = Math.round(current / (1 - discount / 100));
            }

            if (!(original > current)) {
                original = 0;
            }

            return {
                current,
                original,
                discount: discount > 0 ? Math.min(discount, 99) : 0
            };
        }

        function getNewsThumbnail(article) {
            const fallback = 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=120&h=80&fit=crop';
            const thumb =
                article?.thumbnail ||
                article?.image ||
                article?.coverImage ||
                article?.featuredImage ||
                (Array.isArray(article?.images) ? article.images[0] : '') ||
                getFirstImageFromHtml(article?.content || article?.description || article?.body || '');
            return normalizeImageUrl(thumb, fallback);
        }

        function getTutorialThumbnail(tutorial) {
            const fallback = 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=120&h=80&fit=crop';
            const thumb =

            return normalizeImageUrl(thumb, fallback);
        }

                    }
                    if (t.seo.canonical) {
                        const canonical = document.querySelector('link[rel="canonical"]');
                        if (canonical) canonical.setAttribute('href', t.seo.canonical);
                    }
                    if (t.seo.ogTitle) {
                        const ogTitle = document.querySelector('meta[property="og:title"]');
                        if (ogTitle) ogTitle.setAttribute('content', t.seo.ogTitle);
                    }
                    if (t.seo.ogDescription) {
                        const ogDesc = document.querySelector('meta[property="og:description"]');
                        if (ogDesc) ogDesc.setAttribute('content', t.seo.ogDescription);
                    }
                    if (t.seo.ogImage) {
                        const ogImage = document.querySelector('meta[property="og:image"]');
                        if (ogImage) ogImage.setAttribute('content', t.seo.ogImage);
                    }
                }
                
                // Log tutorial info for debugging
                console.log('📊 Tutorial Info:');
                console.log('- Title:', t.title);
                console.log('- Category:', t.category);
                console.log('- Level:', t.level);
                console.log('- Duration:', t.duration);
                console.log('- Featured:', t.featured);
                console.log('- Tags:', t.tags);
                console.log('- SEO:', t.seo);
                
                // Generate table of contents
                generateTableOfContents();
                
                // Load related content
                await Promise.all([
                    loadSuggestedProducts(),
                    loadSuggestedNews(),
                    loadRelatedTutorials()
                ]);
                
                console.log('✅ Tutorial loaded successfully');
                
            } catch (error) {
                console.error('❌ Error loading tutorial:', error);
                document.getElementById('tContent').innerHTML = '<p>Không thể tải nội dung bài giảng. Vui lòng thử lại sau.</p>';
            }
        }
        function selectTutorialHtml(t) {
            try {
                return t && (t.content || t.description || t.body || t.html || '');
            } catch(e) { return ''; }
        }

        function normalizeHtmlContent(html) {
            try {
                if (!html || typeof html !== 'string') {
                    return '<p>Nội dung bài giảng đang được cập nhật...</p>';
                }
                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;

                // Fix image sources and add accessibility/perf attributes
                const imgs = wrapper.querySelectorAll('img');
                imgs.forEach(function(img){
                    try {
                        let src = img.getAttribute('src') || '';
                        if (!src) return;

                        // Protocol-relative URLs
                        if (src.startsWith('//')) {
                            src = 'https:' + src;
                        }
                        // Relative file (no leading slash, no protocol)
                        else if (!/^https?:\/\//i.test(src) && !src.startsWith('/')) {
                            src = '/' + src.replace(/^\.\//, '');
                        }
                        // Ensure uploads keep absolute from site root
                        if (/^(uploads\/|public\/uploads\/)/i.test(src)) {
                            src = '/' + src.replace(/^\//, '');
                        }

                        img.setAttribute('src', src);
                        img.setAttribute('alt', img.getAttribute('alt') || 'Hình ảnh bài giảng');
                        img.setAttribute('loading', 'lazy');
                        img.style.maxWidth = '100%';
                        img.style.height = 'auto';
                        img.style.display = 'block';
                        img.style.marginLeft = 'auto';
                        img.style.marginRight = 'auto';
                        img.style.float = 'none';
                    } catch(_){}
                });

                // Remove inline left paddings/margins on wrappers and center when they contain images
                const wrappers = wrapper.querySelectorAll('p, div, figure');
                wrappers.forEach(function(node){
                    try {
                        if (node.querySelector('img')) {
                            const styleAttr = (node.getAttribute('style') || '').toLowerCase();
                            if (styleAttr.includes('padding-left')) node.style.paddingLeft = '0';
                            if (styleAttr.includes('margin-left')) node.style.marginLeft = '0';
                            node.style.textAlign = 'center';
                        }
                    } catch(_){}
                });

                // Ensure code blocks remain readable
                const pres = wrapper.querySelectorAll('pre');
                pres.forEach(function(pre){
                    pre.style.background = '#f8fafc';
                    pre.style.color = '#1e293b';
                    pre.style.border = '1px solid #e2e8f0';
                });

                return wrapper.innerHTML;
            } catch(e) {
                return html || '<p>Nội dung bài giảng đang được cập nhật...</p>';
            }
        }

        function generateTableOfContents() {
            const content = document.getElementById('tContent');
            const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
            const toc = document.getElementById('toc');
            
            if (headings.length === 0) {
                toc.innerHTML = '<p>Không có mục lục</p>';
                return;
            }
            
            const tocList = document.createElement('ul');
            tocList.style.cssText = 'list-style: none; padding: 0; margin: 0;';
            
            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                
                const level = parseInt(heading.tagName.charAt(1));
                const indent = (level - 1) * 20;
                
                const li = document.createElement('li');
                li.style.cssText = `margin-bottom: 0.5rem; padding-left: ${indent}px;`;
                
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = heading.textContent;
                a.style.cssText = `
                    color: #6b7280;
                    text-decoration: none;
                    font-size: 0.875rem;
                    line-height: 1.4;
                    display: block;
                    padding: 0.25rem 0.5rem;
                    border-radius: 4px;
                    transition: 0.2s;
                `;
                
                a.addEventListener('mouseenter', function() {
                    this.style.background = '#f3f4f6';
                    this.style.color = '#1f2937';
                });
                
                a.addEventListener('mouseleave', function() {
                    this.style.background = 'transparent';
                    this.style.color = '#6b7280';
                });
                
                li.appendChild(a);
                tocList.appendChild(li);
            });
            
            toc.innerHTML = '';
            toc.appendChild(tocList);
        }

        function extractArrayFromResponse(resp) {
            try {
                if (Array.isArray(resp)) return resp;
                if (!resp || typeof resp !== 'object') return [];
                if (Array.isArray(resp.items)) return resp.items;
                if (Array.isArray(resp.results)) return resp.results;
                if (Array.isArray(resp.docs)) return resp.docs;
                if (Array.isArray(resp.data)) return resp.data;
                if (resp.data && typeof resp.data === 'object') {
                    if (Array.isArray(resp.data.items)) return resp.data.items;
                    if (Array.isArray(resp.data.results)) return resp.data.results;
                    if (Array.isArray(resp.data.docs)) return resp.data.docs;
                    if (Array.isArray(resp.data.tutorials)) return resp.data.tutorials;
                }
                if (Array.isArray(resp.tutorials)) return resp.tutorials;
                if (Array.isArray(resp.rows)) return resp.rows;
                if (Array.isArray(resp.list)) return resp.list;
                // Fallback: scan shallow values for first array
                for (var k in resp) { if (Array.isArray(resp[k])) return resp[k]; }
                // Deep scan limited depth
                var stack = [resp]; var depth = 0;
                while (stack.length && depth < 3) {
                    var node = stack.pop();
                    for (var key in node) {
                        var val = node[key];
                        if (Array.isArray(val)) return val;
                        if (val && typeof val === 'object') stack.push(val);
                    }
                    depth++;
                }
                return [];
            } catch(_) { return []; }
        }

        async function loadRelatedTutorials() {
            try {
                const currentSlug = getSlug();
                const res = await fetch(`/api/tutorials?limit=8`);
                if (!res.ok) return;

                const raw = await res.json();
                let tutorials = extractArrayFromResponse(raw);
                if (!Array.isArray(tutorials)) tutorials = [];
                if (tutorials.length === 0 && raw && typeof raw === 'object') {
                    var alt = (raw.payload && (raw.payload.items || raw.payload.docs || raw.payload.data)) ||
                              (raw.result && (raw.result.items || raw.result.docs || raw.result.data));
                    if (Array.isArray(alt)) tutorials = alt;
                }

                const container = document.getElementById('relatedTutorials');
                if (!container) return;

                const relatedTutorials = tutorials
                    .filter(function (tutorial) { return (tutorial.slug || tutorial._id) !== currentSlug; })
                    .slice(0, 3);

                if (relatedTutorials.length === 0) {
                    container.innerHTML = '<p>Kh�ng c� b�i gi?ng li�n quan</p>';
                    return;
                }

                container.innerHTML = relatedTutorials.map(function (tutorial) {
                    const tutorialName = tutorial.title || tutorial.name || 'T�n b�i gi?ng';
                    return (
                        '<a href="/tutorials/' + (tutorial.slug || tutorial._id) + '" class="related-project-item">' +
                            '<img src="' + getTutorialThumbnail(tutorial) + '" alt="' + tutorialName.replace(/"/g,'&quot;') + '" class="related-project-image">' +
                            '<h4 class="related-project-title">' + tutorialName + '</h4>' +
                        '</a>'
                    );
                }).join('');
            } catch (e) {
                console.error('Error loading related tutorials:', e);
            }
        }
        // Load tutorial data
            loadTutorial();

                if (toggle && menu) {

                    } else {

                        }
                    });
                    }
            } catch(e) {
                console.error('Hamburger menu error:', e);
                }
        })();
    </script>
