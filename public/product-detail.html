<!-- Main Content -->

                        </div>

                <div id="pd-tabs-row" class="pd-tabs-row">
                </div>

            </div><!-- /.pd-layout -->

            <!-- Lightbox modal — filled by JS -->
            <div id="pd-modal-root"></div>

    <!-- Debug auth buttons -->

        console.log('🔍 Product detail page loaded');
        console.log('🔍 Auth buttons element:', document.getElementById('auth-buttons'));
        console.log('🔍 Mobile auth buttons element:', document.getElementById('mobile-auth-buttons'));
        
        // Force render auth buttons
        setTimeout(function() {
            if (typeof renderAuthButtons === 'function') {
                console.log('🔍 Calling renderAuthButtons...');
                renderAuthButtons();
            } else {
                console.log('❌ renderAuthButtons function not found');
            }
        }, 1000);
    });
    </script>
    <script>
    (function(){
        try {
            var toggle = document.querySelector('.nav-toggle');
            var menu = document.querySelector('.nav-menu');
            if (toggle && menu) {
                toggle.addEventListener('click', function(){
                    menu.classList.toggle('active');
                });
                menu.addEventListener('click', function(e){
                    if (e.target && e.target.classList && e.target.classList.contains('nav-link')) {
                        menu.classList.remove('active');
                    }
                });
            }
        } catch (e) {}
    })();
    </script>
