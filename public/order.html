    <meta name="description" content="Xem và quản lý đơn hàng của bạn tại Smart Steam">

<body class="orders-page">
<!-- ======================== ORDERS CONTENT SECTION ======================== -->
    <section id="page-orders" class="main">
        <div class="container">
            

            <div id="pageGrid" class="page-grid">
                <section class="orders" aria-label="Danh sách đơn hàng">
                    <h2 class="section-title" style="margin:0; font-size:34px; letter-spacing:-0.02em;">Giỏ hàng</h2>
                    <div class="title-underline"></div>
                    <div id="ordersGrid" class="orders-list"></div>
                    <div id="ordersEmpty" class="orders-empty" style="display:none;">
                        <div> Chưa có sản phẩm nào</div>
                        <a class="btn-red" href="/products" style="margin-left:8px;">MUA SẮM NGAY</a>
                    </div>
                    <div>
                </section>
                <aside class="summary" aria-label="Tóm tắt đơn hàng">
                    <div class="sum-row"><span class="sum-title">Thanh toán</span></div>
                    <div class="sum-row"><span class="sum-muted">Tạm tính</span><span id="sum-subtotal">0 đ</span></div>
                    <div class="sum-row"><span class="sum-muted">Phí vận chuyển</span><span id="sum-shipping">0 đ</span></div>
                    <div class="coupon">
                        <input id="coupon-input" placeholder="Mã giảm giá">
                        <button id="coupon-apply">Áp dụng</button>
                    </div>
                    <div class="sum-row"><span class="sum-muted">Email</span><span id="sum-email" class="sum-muted"></span></div>
                    <div class="sum-row"><span class="sum-title">Tổng thanh toán</span><span id="ordersTotalValue" class="sum-total">0 đ</span></div>
                    <button id="checkout-btn" class="checkout-btn" onclick="submitOrder()">GỬI ĐƠN HÀNG</button>
                </aside>
            </div>
        </div>
    </section>

    <!-- Footer -->

    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/orders-page.js"></script>
